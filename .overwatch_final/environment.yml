# environment.yml — Python package requirements for OVERWATCH V3 (SiS runtime)
# ─────────────────────────────────────────────────────────────────────────────
# Snowflake SiS resolves packages from the Snowflake Conda channel.
# All packages listed must be available in:
#   https://repo.anaconda.com/pkgs/snowflake
#
# IMPORTANT: Do NOT pin exact versions unless you have a specific reason.
# The Snowflake channel lags PyPI by weeks; over-pinning causes deploy failures.
# ─────────────────────────────────────────────────────────────────────────────
name: overwatch_v3
channels:
  - snowflake
dependencies:
  - python=3.12
  - streamlit
  - pandas
  - altair
  - snowflake-snowpark-python
  - pyarrow                  # Required for Arrow-based DataFrame interchange
  - python-dateutil           # Date parsing helpers
  - requests                  # Future webhook support; current alerts are email-first
