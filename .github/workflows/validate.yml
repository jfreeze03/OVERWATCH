name: Validate

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  python:
    name: Python validation
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          # Keep in sync with runtime.txt (python-3.12).
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt

      - name: Lint with ruff
        run: python -m ruff check .overwatch_final tests

      - name: Type-check with mypy
        run: python -m mypy

      - name: Compile Python sources
        run: python -m compileall .overwatch_final tests

      - name: Validate deployment contract
        run: python -m unittest tests.test_deployment_contract

      - name: Run production shell guards
        run: |
          python -m unittest \
            tests.test_navigation_integrity.NavigationIntegrityTests.test_streamlit_deployment_entrypoints_are_pinned \
            tests.test_navigation_integrity.NavigationIntegrityTests.test_app_shell_header_renders_before_sidebar_hydration \
            tests.test_navigation_integrity.NavigationIntegrityTests.test_workflow_hubs_replace_scattered_operational_pages \
            tests.test_navigation_integrity.NavigationIntegrityTests.test_dead_ui_helpers_stay_removed

      - name: Run Cortex guardrails
        run: python -m unittest tests.test_cortex_guard

      - name: Run Decision Brief contracts
        run: python -m unittest tests.test_section_command_brief

      - name: Run Decision Workspace data-binding and setup-health tests
        run: python -m unittest tests.test_decision_workspace_data_binding

      - name: Run Decision Workspace performance budget tests
        run: python -m unittest tests.test_decision_workspace_performance_budget

      - name: Run Decision Workspace HTML snapshot tests
        run: |
          python -m unittest \
            tests.test_decision_workspace_data_binding.DecisionWorkspaceDataBindingTests.test_html_snapshot_fallback_has_workspace_without_legacy_instruction_copy \
            tests.test_decision_workspace_data_binding.DecisionWorkspaceDataBindingTests.test_html_snapshot_all_primary_sections_have_workspace_without_legacy_card_wall

      - name: Run theme and popover accessibility tests
        run: python -m unittest tests.test_theme_registry

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Upload Decision Workspace proof artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: decision-workspace-proof
          if-no-files-found: warn
          path: |
            artifacts/decision_workspace_performance_summary.json
            artifacts/ui_query_telemetry.json
            artifacts/decision_workspace_html_snapshots/**
            artifacts/browser_screenshots/**

      - name: Scan for mojibake characters
        run: |
          python - <<'PY'
          from pathlib import Path

          bad_tokens = tuple(
              chr(code)
              for code in (
                  0x00E2,
                  0x00F0,
                  0xFFFD,
                  0x00C3,
                  0x00C2,
                  0x20AC,
                  0x0153,
                  0x017D,
                  0x0178,
                  0x009D,
                  0x0090,
                  0x008D,
              )
          ) + (chr(0x20AC) + chr(0x2122),)
          roots = [Path(".overwatch_final"), Path("tests"), Path(".github")]
          hits = []
          for root in roots:
              if not root.exists():
                  continue
              for path in root.rglob("*"):
                  if path.is_dir() or any(part == "__pycache__" for part in path.parts):
                      continue
                  try:
                      text = path.read_text(encoding="utf-8")
                  except UnicodeDecodeError:
                      continue
                  for line_no, line in enumerate(text.splitlines(), 1):
                      if any(token in line for token in bad_tokens):
                          hits.append(f"{path}:{line_no}:{line.strip()}")
          if hits:
              print("\n".join(hits))
              raise SystemExit(1)
          PY
