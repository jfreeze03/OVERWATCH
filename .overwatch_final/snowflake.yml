# -----------------------------------------------------------------------------
# OVERWATCH - Streamlit-in-Snowflake (SiS) Deployment Manifest
# Account:   ALFA Insurance
# App:       DBA_MAINT_DB.OVERWATCH.OVERWATCH
# Roles:     SNOW_ACCOUNTADMINS, SNOW_SYSADMINS
# Warehouse: WH_ALFA_OVERWATCH
#
# Deployment:
#   snow streamlit deploy --replace
#
# Streamlit in Snowflake uses owner rights by default. Snowflake's Streamlit
# project definition does not support execution-mode override keys; keep
# owner-rights safety enforced in app code and release gates.
# -----------------------------------------------------------------------------
# OWNER-RIGHTS SAFETY MEANS:
#   SQL statements execute through the reviewed OVERWATCH app owner context, so
#   the app must keep first paint packet-only, gate live/admin actions, and avoid
#   exposing raw source details in daily UI.
#
# IMPLICATION FOR APP OWNER ROLE:
#   If you later create a dedicated OVERWATCH admin role, grant it the same
#   privileges before deploying the app:
#
#     -- Required for ALL ACCOUNT_USAGE queries (every section)
#     GRANT IMPORTED PRIVILEGES ON DATABASE SNOWFLAKE TO ROLE <role>;
#
#     -- Required for OVERWATCH internal tables (annotations, alerts, action queue)
#     GRANT SELECT, INSERT, UPDATE, DELETE
#       ON ALL TABLES IN SCHEMA DBA_MAINT_DB.OVERWATCH TO ROLE <role>;
#
#     -- Required for guarded admin workflows: SHOW WAREHOUSES, IS.QUERY_HISTORY
#     GRANT MONITOR ON ACCOUNT TO ROLE <role>;
#
#     -- Required to run the Streamlit app and its Snowflake queries
#     GRANT USAGE ON WAREHOUSE WH_ALFA_OVERWATCH TO ROLE <role>;
#
#   Without IMPORTED PRIVILEGES on SNOWFLAKE, every ACCOUNT_USAGE query returns
#   a permissions error and the section shows an empty state. This is the single
#   most common misconfiguration when expanding OVERWATCH to non-admin users.
# -----------------------------------------------------------------------------

definition_version: 2
entities:
  streamlit_app:
    type: streamlit
    identifier:
      database: DBA_MAINT_DB
      schema: OVERWATCH
      name: OVERWATCH
    title: "OVERWATCH - Snowflake DBA Monitor"
    comment: "DBA monitoring app for ALFA Insurance"

    # Warehouse used by SiS for Python execution. SQL queries run here unless
    # the session executes USE WAREHOUSE first.
    query_warehouse: WH_ALFA_OVERWATCH
    main_file: app.py
    artifacts:
      - app.py
      - access_control.py
      - app_entry_timing.py
      - brand.py
      - config.py
      - filters.py
      - layout.py
      - navigation.py
      - perf_trace.py
      - performance.py
      - query_contracts.py
      - refresh.py
      - route_registry.py
      - runtime_boundaries.py
      - runtime_state.py
      - section_dispatch.py
      - shell.py
      - theme.py
      - theme_assets/
      - version.py
      - workflow_contracts.py
      - environment.yml
      - pyproject.toml
      - queries/
      - utils/
      - sections/
