[mypy]
# Scoped, incremental typing gate.
#
# IMPORTANT: This is intentionally NOT a whole-repo type check. The wider
# OVERWATCH codebase is not yet typed (it currently has on the order of ~1000
# mypy findings), so type-checking everything would be pure noise. Instead we
# maintain a curated allowlist of modules that are verified type-clean and grow
# it over time. Only the modules listed in `files` below are gated.
#
# How to grow the allowlist (do this in small, safe steps):
#   1. Pick a low-risk module (leaf utilities with few internal deps are best).
#   2. Run it locally:
#        mypy --ignore-missing-imports --follow-imports=silent \
#             .overwatch_final/<path>.py
#   3. If it reports 0 errors, add it to the `files` list below.
#   4. Re-run `mypy` (no args, picks up this config) to confirm the whole
#      allowlist still passes together, then commit.
#   5. If a module needs a few annotations to become clean, prefer adding the
#      annotations over loosening the gate.
#
# Keep this list honest: a module belongs here only if it is actually clean.
python_version = 3.12
ignore_missing_imports = True
follow_imports = silent
mypy_path = .overwatch_final
files =
    .overwatch_final/utils/sql_safe.py,
    .overwatch_final/utils/state_keys.py,
    .overwatch_final/utils/section_guidance.py,
    .overwatch_final/utils/evidence_mode.py,
    .overwatch_final/utils/predictive_sla.py,
    .overwatch_final/utils/incident_correlation.py,
    .overwatch_final/utils/metering_sql.py,
    tools
