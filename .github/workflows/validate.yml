name: Validate

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  python:
    name: Python validation
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          # Keep in sync with runtime.txt (python-3.12).
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt

      - name: Lint with ruff
        run: python -m ruff check .overwatch_final tests tools

      - name: Type-check with mypy
        run: python -m mypy

      - name: Compile Python sources
        run: python -m compileall .overwatch_final tests tools

      - name: Validate deployment contract
        run: python -m unittest tests.test_deployment_contract

      - name: Run production shell guards
        run: |
          python -m unittest \
            tests.test_navigation_integrity.NavigationIntegrityTests.test_streamlit_deployment_entrypoints_are_pinned \
            tests.test_navigation_integrity.NavigationIntegrityTests.test_app_shell_header_renders_before_sidebar_hydration \
            tests.test_navigation_integrity.NavigationIntegrityTests.test_workflow_hubs_replace_scattered_operational_pages \
            tests.test_navigation_integrity.NavigationIntegrityTests.test_dead_ui_helpers_stay_removed

      - name: Run Cortex guardrails
        run: python -m unittest tests.test_cortex_guard

      - name: Run Decision Brief contracts
        run: python -m unittest tests.test_section_command_brief

      - name: Run Decision Workspace data-binding and setup-health tests
        run: python -m unittest tests.test_decision_workspace_data_binding

      - name: Run Decision Workspace performance budget tests and button-route tests
        run: python -m unittest tests.test_decision_workspace_performance_budget

      - name: Run full app validation tests
        run: python -m unittest tests.test_full_app_runtime_validation

      - name: Run full app gauntlet tests
        run: python -m unittest tests.test_full_app_gauntlet

      - name: Run launch gauntlet closure tests
        run: |
          python -m unittest \
            tests.test_full_app_launch_gauntlet \
            tests.test_full_app_release_sweep \
            tests.test_deterministic_streamlit_render \
            tests.test_browser_smoke_runner \
            tests.test_rendered_ui_leak_scan \
            tests.test_render_provenance_reconciliation \
            tests.test_action_click_gauntlet \
            tests.test_export_download_gauntlet \
            tests.test_settings_live_feature_gauntlet \
            tests.test_sql_value_inventory \
            tests.test_sql_dead_code_scan \
            tests.test_user_stress_test \
            tests.test_source_internal_leak_scan

      - name: Run full app release sweep tests
        run: python -m unittest tests.test_full_app_release_sweep tests.test_settings_live_feature_gauntlet

      - name: Run launch readiness tests
        run: python -m unittest tests.test_launch_readiness

      - name: Run query-performance contract tests
        run: python -m unittest tests.test_decision_workspace_performance_budget.DecisionWorkspacePerformanceBudgetTests.test_query_contract_linter_flags_risky_shapes_and_passes_packet_lookup

      - name: Run direct-SQL static scan tests
        run: python -m unittest tests.test_direct_sql_contract
      - name: Run session-open static scan tests
        run: python -m unittest tests.test_session_open_contract

      - name: Run SQL performance linter tests
        run: python -m unittest tests.test_sql_performance_lint

      - name: Run A-grade production gate tests
        run: |
          python -m unittest \
            tests.test_a_grade_execution_matrix \
            tests.test_artifact_verifier \
            tests.test_release_evidence_registry \
            tests.test_plan_adherence_report \
            tests.test_runtime_event_ledger \
            tests.test_route_action_replay \
            tests.test_export_case_parity \
            tests.test_first_paint_slo \
            tests.test_query_boundary_lint \
            tests.test_account_usage_query_audit \
            tests.test_summary_mart_setup \
            tests.test_ui_system_grade \
            tests.test_compatibility

      - name: Run Snowflake execution validation tests
        run: python -m unittest tests.test_snowflake_execution_validation

      - name: Run Snowflake CLI live validation tests
        run: python -m unittest tests.test_snowflake_cli_live_validation tests.test_packet_availability_live_validation

      - name: Run production release candidate tests
        run: python -m unittest tests.test_production_release_candidate tests.test_snowflake_object_drift_validation tests.test_post_deploy_smoke

      - name: Run COST_DB formula authority tests
        run: python -m unittest tests.test_cost_db_formula_authority tests.test_cost_formula_authority tests.test_cortex_service_types tests.test_formula_end_to_end_validation tests.test_formula_packet_sql tests.test_packet_schema_upgrade tests.test_cost_contract_advisor

      - name: Run encoding hygiene tests
        run: python -m unittest tests.test_encoding_hygiene

      - name: Run widget-state regression tests
        run: python -m unittest tests.test_global_date_range_widget tests.test_shell_rendering

      - name: Run cleanup inventory tests
        run: python -m unittest tests.test_cleanup_inventory

      - name: Run Decision Workspace HTML snapshot tests
        run: |
          python -m unittest \
            tests.test_decision_workspace_data_binding.DecisionWorkspaceDataBindingTests.test_html_snapshot_fallback_has_workspace_without_legacy_instruction_copy \
            tests.test_decision_workspace_data_binding.DecisionWorkspaceDataBindingTests.test_html_snapshot_all_primary_sections_have_workspace_without_legacy_card_wall

      - name: Run theme and popover accessibility tests
        run: python -m unittest tests.test_theme_registry

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Regenerate full app gauntlet proof artifacts
        run: python -m unittest tests.test_full_app_gauntlet tests.test_deterministic_streamlit_render tests.test_browser_smoke_runner tests.test_browser_render_gauntlet tests.test_runtime_artifact_provenance tests.test_render_provenance_reconciliation

      - name: Run full app runtime validation contract
        run: python -m tools.contracts.full_app_runtime_validation

      - name: Regenerate launch readiness proof artifacts
        run: python -m unittest tests.test_launch_readiness

      - name: Run encoding hygiene gate
        run: python -m tools.contracts.encoding_hygiene

      - name: Run COST_DB formula authority gate
        run: python -m tools.contracts.cost_db_formula_authority

      - name: Run formula end-to-end gate
        run: python -m tools.contracts.formula_end_to_end_validation

      - name: Run Snowflake CLI live validation gate
        run: python -m tools.contracts.snowflake_cli_live_validation --profile internal_fixture --skip-refresh

      - name: Run production release candidate orchestrator
        run: python -m tools.contracts.production_release_candidate --profile internal_fixture --skip-refresh

      - name: Run plan adherence report gate
        run: python -m tools.contracts.plan_adherence_report

      - name: Run A-grade execution matrix gate
        run: python -m tools.contracts.a_grade_execution_matrix

      - name: Run artifact integrity gate
        run: python -m tools.contracts.artifact_verifier

      - name: Run release evidence registry gate
        run: python -m tools.contracts.release_evidence_registry

      - name: Run runtime event ledger gate
        run: python -m tools.contracts.runtime_event_ledger

      - name: Run route action replay gate
        run: python -m tools.contracts.route_action_replay

      - name: Run export/case parity gate
        run: python -m tools.contracts.export_case_parity

      - name: Run query-boundary lint gate
        run: python -m tools.contracts.query_boundary_lint

      - name: Run Account Usage query audit gate
        run: python -m tools.contracts.account_usage_query_audit

      - name: Run summary mart setup gate
        run: python -m tools.contracts.summary_mart_setup

      - name: Run first-paint SLO gate
        run: python -m tools.contracts.first_paint_slo

      - name: Run performance budget gate
        run: python -m tools.contracts.performance_budget_gate

      - name: Run UI system grade gate
        run: python -m tools.contracts.ui_system_grade

      - name: Upload Decision Workspace proof artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: decision-workspace-proof
          if-no-files-found: warn
          path: |
            artifacts/decision_workspace_performance_summary.json
            artifacts/ui_query_telemetry.json
            artifacts/query_performance_summary.json
            artifacts/query_plan_findings.json
            artifacts/query_registry.json
            artifacts/query_lint_findings.json
            artifacts/query_elapsed_by_section.json
            artifacts/query_*
            artifacts/query_history_by_tag.json
            artifacts/query_history_by_tag_SKIPPED.txt
            artifacts/query_bytes_by_boundary.json
            artifacts/query_slow_findings.json
            artifacts/query_search_proof.json
            artifacts/full_app_validation/**
            artifacts/full_app_inventory/**
            artifacts/launch_readiness/**
            artifacts/release_candidate/**
            artifacts/formula_authority/**
            artifacts/encoding_hygiene_results.json
            artifacts/snowflake_validation/**
            artifacts/direct_sql_static_scan.json
            artifacts/session_open_static_scan.json
            artifacts/sql_performance_lint_findings.json
            artifacts/sql_performance_lint_file_inventory.json
            artifacts/cleanup/**
            artifacts/brand/**
            artifacts/button_route_manifest.json
            artifacts/button_route_results.json
            artifacts/generated_button_artifacts/**
            artifacts/decision_workspace_html_snapshots/**
            artifacts/browser_screenshots/**
            scripts/run_snowflake_cli_live_validation.ps1
            scripts/run_snowflake_cli_live_validation.sh
            docs/snowflake_cli_live_validation.md
