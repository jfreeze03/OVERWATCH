# Ruff configuration for OVERWATCH.
#
# The gate is intentionally scoped to high-signal correctness rules. We run the
# default rule set (pycodestyle errors E4/E7/E9 + Pyflakes F) but ignore a small
# set of codes that are dominated by pre-existing, behaviorally-sensitive legacy
# patterns, so CI does not fail on hundreds of legacy style issues. New code is
# still held to the remaining rules (syntax errors, comparison/assert bugs,
# string-format bugs, redefinitions, etc.).
target-version = "py312"

extend-exclude = ["**/__pycache__"]

[lint]
# Default select is ["E4", "E7", "E9", "F"].
ignore = [
    "F401",  # unused-import: utils/* and section packages re-export many symbols
             # (e.g. utils/__init__ lazy re-exports, sql_safe re-exports), so
             # static "unused" detection produces false positives here.
    "F541",  # f-string-missing-placeholders: cosmetic legacy occurrences.
    "F601",  # multi-value-repeated-key-literal: pre-existing "last value wins"
             # dict literals; changing them could alter behavior (tracked as a
             # follow-up, not a CI blocker).
    "F821",  # undefined-name: false positives from the lazy `pd = lazy_pandas()`
             # / lazy-util binding pattern used across sections.
    "F841",  # unused-variable: stylistic legacy locals.
]
