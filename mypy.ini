[mypy]
# Scoped, incremental typing gate. The wider codebase is not yet typed, so we
# start with a curated allowlist of type-clean modules and grow it over time.
# This keeps CI honest without forcing a massive one-shot typing migration.
python_version = 3.12
ignore_missing_imports = True
follow_imports = silent
mypy_path = .overwatch_final
files =
    .overwatch_final/utils/sql_safe.py,
    .overwatch_final/utils/state_keys.py,
    .overwatch_final/utils/section_guidance.py
