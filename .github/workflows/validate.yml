name: Validate

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  python:
    name: Python validation
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          # Keep in sync with runtime.txt (python-3.12).
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt

      - name: Lint with ruff
        run: python -m ruff check .overwatch_final tests tools

      - name: Type-check with mypy
        run: python -m mypy

      - name: Compile Python sources
        run: python -m compileall .overwatch_final tests tools

      - name: Validate deployment contract
        run: python -m unittest tests.test_deployment_contract

      - name: Run production shell guards
        run: |
          python -m unittest \
            tests.test_navigation_integrity.NavigationIntegrityTests.test_streamlit_deployment_entrypoints_are_pinned \
            tests.test_navigation_integrity.NavigationIntegrityTests.test_app_shell_header_renders_before_sidebar_hydration \
            tests.test_navigation_integrity.NavigationIntegrityTests.test_workflow_hubs_replace_scattered_operational_pages \
            tests.test_navigation_integrity.NavigationIntegrityTests.test_dead_ui_helpers_stay_removed

      - name: Run Cortex guardrails
        run: python -m unittest tests.test_cortex_guard

      - name: Run Decision Brief contracts
        run: python -m unittest tests.test_section_command_brief

      - name: Run Decision Workspace data-binding and setup-health tests
        run: python -m unittest tests.test_decision_workspace_data_binding

      - name: Run Decision Workspace performance budget tests and button-route tests
        run: python -m unittest tests.test_decision_workspace_performance_budget

      - name: Run full app validation tests
        run: python -m unittest tests.test_full_app_runtime_validation

      - name: Run full app gauntlet tests
        run: python -m unittest tests.test_full_app_gauntlet

      - name: Run launch readiness tests
        run: python -m unittest tests.test_launch_readiness

      - name: Run query-performance contract tests
        run: python -m unittest tests.test_decision_workspace_performance_budget.DecisionWorkspacePerformanceBudgetTests.test_query_contract_linter_flags_risky_shapes_and_passes_packet_lookup

      - name: Run direct-SQL static scan tests
        run: python -m unittest tests.test_direct_sql_contract
      - name: Run session-open static scan tests
        run: python -m unittest tests.test_session_open_contract

      - name: Run SQL performance linter tests
        run: python -m unittest tests.test_sql_performance_lint

      - name: Run Snowflake execution validation tests
        run: python -m unittest tests.test_snowflake_execution_validation

      - name: Run COST_DB formula authority tests
        run: python -m unittest tests.test_cost_db_formula_authority tests.test_cost_formula_authority tests.test_cortex_service_types

      - name: Run encoding hygiene tests
        run: python -m unittest tests.test_encoding_hygiene

      - name: Run cleanup inventory tests
        run: python -m unittest tests.test_cleanup_inventory

      - name: Run Decision Workspace HTML snapshot tests
        run: |
          python -m unittest \
            tests.test_decision_workspace_data_binding.DecisionWorkspaceDataBindingTests.test_html_snapshot_fallback_has_workspace_without_legacy_instruction_copy \
            tests.test_decision_workspace_data_binding.DecisionWorkspaceDataBindingTests.test_html_snapshot_all_primary_sections_have_workspace_without_legacy_card_wall

      - name: Run theme and popover accessibility tests
        run: python -m unittest tests.test_theme_registry

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Regenerate full app gauntlet proof artifacts
        run: python -m unittest tests.test_full_app_gauntlet

      - name: Regenerate launch readiness proof artifacts
        run: python -m unittest tests.test_launch_readiness

      - name: Run encoding hygiene gate
        run: python -m tools.contracts.encoding_hygiene

      - name: Run COST_DB formula authority gate
        run: python -m tools.contracts.cost_db_formula_authority

      - name: Upload Decision Workspace proof artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: decision-workspace-proof
          if-no-files-found: warn
          path: |
            artifacts/decision_workspace_performance_summary.json
            artifacts/ui_query_telemetry.json
            artifacts/query_performance_summary.json
            artifacts/query_plan_findings.json
            artifacts/query_registry.json
            artifacts/query_lint_findings.json
            artifacts/query_elapsed_by_section.json
            artifacts/query_*
            artifacts/query_history_by_tag.json
            artifacts/query_history_by_tag_SKIPPED.txt
            artifacts/query_bytes_by_boundary.json
            artifacts/query_slow_findings.json
            artifacts/query_search_proof.json
            artifacts/full_app_validation/**
            artifacts/full_app_inventory/**
            artifacts/launch_readiness/**
            artifacts/release_candidate/**
            artifacts/formula_authority/**
            artifacts/encoding_hygiene_results.json
            artifacts/snowflake_validation/**
            artifacts/direct_sql_static_scan.json
            artifacts/session_open_static_scan.json
            artifacts/sql_performance_lint_findings.json
            artifacts/sql_performance_lint_file_inventory.json
            artifacts/cleanup/**
            artifacts/brand/**
            artifacts/button_route_manifest.json
            artifacts/button_route_results.json
            artifacts/generated_button_artifacts/**
            artifacts/decision_workspace_html_snapshots/**
            artifacts/browser_screenshots/**
