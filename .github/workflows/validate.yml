name: Validate

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  python:
    name: Python validation
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            .overwatch_final/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install ruff mypy

      - name: Run ruff lint
        run: |
          python -m ruff check \
            .overwatch_final/utils/sql_safe.py \
            tests/test_query_guardrails.py \
            tests/test_deployment_contract.py

      - name: Run scoped mypy
        run: python -m mypy --ignore-missing-imports .overwatch_final/utils/sql_safe.py

      - name: Compile Python sources
        run: python -m compileall .overwatch_final tests

      - name: Validate deployment contract
        run: python -m unittest tests.test_deployment_contract

      - name: Run production shell guards
        run: |
          python -m unittest \
            tests.test_navigation_integrity.NavigationIntegrityTests.test_streamlit_deployment_entrypoints_are_pinned \
            tests.test_navigation_integrity.NavigationIntegrityTests.test_app_shell_header_renders_before_sidebar_hydration \
            tests.test_navigation_integrity.NavigationIntegrityTests.test_workflow_hubs_replace_scattered_operational_pages \
            tests.test_navigation_integrity.NavigationIntegrityTests.test_dead_ui_helpers_stay_removed

      - name: Run Cortex guardrails
        run: python -m unittest tests.test_cortex_guard

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Scan for mojibake characters
        run: |
          python - <<'PY'
          from pathlib import Path

          bad_tokens = tuple(
              chr(code)
              for code in (
                  0x00E2,
                  0x00F0,
                  0xFFFD,
                  0x00C3,
                  0x00C2,
                  0x20AC,
                  0x0153,
                  0x017D,
                  0x0178,
                  0x009D,
                  0x0090,
                  0x008D,
              )
          ) + (chr(0x20AC) + chr(0x2122),)
          roots = [Path(".overwatch_final"), Path("tests"), Path(".github")]
          hits = []
          for root in roots:
              if not root.exists():
                  continue
              for path in root.rglob("*"):
                  if path.is_dir() or any(part == "__pycache__" for part in path.parts):
                      continue
                  try:
                      text = path.read_text(encoding="utf-8")
                  except UnicodeDecodeError:
                      continue
                  for line_no, line in enumerate(text.splitlines(), 1):
                      if any(token in line for token in bad_tokens):
                          hits.append(f"{path}:{line_no}:{line.strip()}")
          if hits:
              print("\n".join(hits))
              raise SystemExit(1)
          PY
